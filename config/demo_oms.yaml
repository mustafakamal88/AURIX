enabled: true
symbol: "XAUUSDm"
mode: "DEMO_OMS_DRY_RUN"
account_currency: "GBP"

# Execution permissions
allow_order_intent_creation: true
allow_order_request_event_creation: true
allow_demo_execution: false
allow_live_arming: false
allow_live_execution: false
allow_real_account_execution: false

# Required safety gates
require_demo_account: true
require_real_account_blocked: true
require_signal_command_id_null: true
require_event_bus_enabled: true
require_risk_governor_approval: true
require_strategy_signal_event: true
require_symbol_match: true
require_account_currency_match: true
require_no_open_oms_order_for_symbol: true
require_no_open_broker_position_for_symbol: false

# Trade limits
max_volume: 0.01
max_trades_per_day: 1
max_open_orders: 1
max_spread_points: 270
max_slippage_points: 50
max_daily_loss_amount: 1.0
max_order_age_seconds: 30

# Supported order behavior
allowed_order_types:
  - MARKET_BUY
  - MARKET_SELL

allowed_strategies:
  - "fast_rsi_first_reversal"
  - "xauusd_paper_v1"
  - "xauusd_paper_v2"

write_history: true
history_limit: 500
